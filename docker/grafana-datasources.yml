# Grafana Datasources Configuration
# Connects Grafana to Loki, Prometheus, Elasticsearch, and Jaeger

apiVersion: 1

datasources:
  # ────────────────────────────────────────────────────────────
  # Loki - Logs
  # ────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true

  # ────────────────────────────────────────────────────────────
  # Prometheus - Metrics
  # ────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true

  # ────────────────────────────────────────────────────────────
  # Elasticsearch - Alternative Log Storage
  # ────────────────────────────────────────────────────────────
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "[logs-]YYYY.MM.DD"
    isDefault: false
    editable: true
    jsonData:
      esVersion: 8.0.0
      timeField: "@timestamp"
      logMessageField: "message"
      logLevelField: "level"

  # ────────────────────────────────────────────────────────────
  # Jaeger - Distributed Tracing
  # ────────────────────────────────────────────────────────────
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    editable: true
