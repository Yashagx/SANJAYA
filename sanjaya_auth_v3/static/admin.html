<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SANJAYA — Admin Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2e3250; --accent: #6c63ff; --accent2: #00d4aa;
    --danger: #ff4d6d; --warn: #f4a22d; --text: #e8eaf6; --muted: #7b82b5;
    --admin: #ff6b6b; --manager: #ffd93d; --user: #6bcb77;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .topbar .logo { font-weight: 800; font-size: 18px; letter-spacing: 2px; color: var(--accent); }
  
  .layout { display: flex; min-height: calc(100vh - 60px); }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; }
  .nav-item { padding: 12px 14px; border-radius: 8px; cursor: pointer; font-size: 15px; color: var(--text); font-weight: 600; border: none; background: none; text-align: left; transition: 0.2s; }
  .nav-item:hover { background: var(--surface2); }
  .nav-item.active { background: rgba(108,99,255,0.15); color: var(--accent); }
  
  .main-content { flex: 1; padding: 28px; overflow-y: auto; }
  .page-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
  th { padding: 16px; background: var(--surface2); color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
  td { padding: 16px; border-top: 1px solid var(--border); }
  tr:hover td { background: rgba(255,255,255,0.02); }
  
  .btn { padding: 10px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff;}
  .btn-success { background: var(--accent2); color: #111;}
  
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 400px; }
  .modal h3 { margin-bottom: 16px; }
  .modal label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; display: block;}
  .modal input, .modal select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); margin-bottom: 16px; font-size:14px; }
  .modal .btn { width: 100%; margin-top: 4px; }
  .role-badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
  .role-admin { background: rgba(255,107,107,0.2); color: var(--admin); border: 1px solid var(--admin); }
  .role-manager { background: rgba(244,162,45,0.2); color: var(--warn); border: 1px solid var(--warn); }
  .role-user { background: rgba(107,203,119,0.2); color: var(--user); border: 1px solid var(--user); }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">SANJAYA ADMIN CENTER</div>
  <div><button class="btn btn-secondary" onclick="logout()">Sign Out</button></div>
</div>
<div class="layout">
  <div class="sidebar">
    <button class="nav-item active" onclick="nav('users')" id="nav-users">🛡️ Access Management</button>
    <button class="nav-item" onclick="nav('logs')" id="nav-logs">📋 Unified Telemetry</button>
  </div>
  <div class="main-content" id="content">Loading Admin Module...</div>
</div>

<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h3>Provision New User</h3>
    <label>Username</label>
    <input type="text" id="nu-user" placeholder="Enter username">
    <label>Email Address</label>
    <input type="email" id="nu-email" placeholder="example@sanjaya.local">
    <label>Password</label>
    <input type="password" id="nu-pass" placeholder="Min 8 characters">
    <label>RBAC Role</label>
    <select id="nu-role"><option value="user">User</option><option value="manager">Manager</option><option value="admin">Administrator</option></select>
    <div style="display:flex;gap:10px;margin-top:10px;">
      <button class="btn btn-secondary" onclick="document.getElementById('create-modal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="createUser()">Create User</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('token');
if(window.location.hash.includes('token=')) {
  token = window.location.hash.split('token=')[1];
  localStorage.setItem('token', token);
  window.history.replaceState(null, '', '/admin.html');
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401) window.location.href = '/';
  if (!res.ok) {
    const d = await res.json().catch(()=>({}));
    throw new Error(d.detail || res.statusText);
  }
  return res.json();
}

function nav(page) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  if (page === 'users') loadUsers();
  if (page === 'logs') loadLogs();
}

async function loadUsers() {
  document.getElementById('content').innerHTML = `
    <div class="page-title">User Directory & Status</div>
    <div class="page-sub">Quickly promote/demote users or adjust access tokens</div>
    <div class="table-wrap">
      <div class="table-header">
         <h3>All Registered Users</h3>
         <button class="btn btn-primary" onclick="document.getElementById('create-modal').classList.add('open')">+ Provision User</button>
      </div>
      <table>
        <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="user-tbody"><tr><td colspan="5">Fetching from database...</td></tr></tbody>
      </table>
    </div>
  `;
  try {
    const users = await api('GET', '/admin/users');
    document.getElementById('user-tbody').innerHTML = users.map(u => `
      <tr>
        <td style="font-weight:600">${u.username}</td>
        <td style="color:var(--muted)">${u.email_masked}</td>
        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
        <td>${u.is_active ? '<span style="color:var(--user)">● Active</span>' : '<span style="color:var(--muted)">○ Disabled</span>'}</td>
        <td style="display:flex;gap:8px;">
          <select onchange="updateRole('${u.id}', this.value)" style="padding:6px;border-radius:4px;background:var(--surface);color:var(--text);border:1px solid var(--border);">
            <option value="user" ${u.role==='user'?'selected':''}>User</option>
            <option value="manager" ${u.role==='manager'?'selected':''}>Manager</option>
            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
          </select>
          <button class="btn ${u.is_active ? 'btn-danger' : 'btn-success'}" onclick="toggleActive('${u.id}', ${!u.is_active})">${u.is_active ? 'Disable' : 'Enable'}</button>
        </td>
      </tr>
    `).join('');
  } catch(e) { alert(e.message); }
}

async function loadLogs() {
  document.getElementById('content').innerHTML = `
    <div class="page-title">Live Telemetry</div>
    <div class="page-sub">Combined Application Logs (Tracking Port 8000 & 8001 seamlessly)</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Timestamp</th><th>Action</th><th>Status</th><th>Target Identity</th><th>Origin Router</th><th>Details</th></tr></thead>
        <tbody id="log-tbody"><tr><td colspan="6">Establishing stream...</td></tr></tbody>
      </table>
    </div>
  `;
  try {
    const logs = await api('GET', '/admin/logs?limit=400');
    document.getElementById('log-tbody').innerHTML = logs.map(l => `
      <tr>
        <td style="color:var(--muted)">${new Date(l.timestamp+'Z').toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</td>
        <td><code style="color:var(--accent);font-size:13px">${l.action}</code></td>
        <td>${l.status==='success'?'<span style="color:var(--user);font-weight:600">✓ Accepted</span>':'<span style="color:var(--danger);font-weight:600">✗ Failed / Error</span>'}</td>
        <td style="font-weight:600;">${l.username || 'System Root'}</td>
        <td style="color:var(--muted);font-family:monospace">${l.ip_address}</td>
        <td style="color:var(--warn);line-height:1.4">${l.detail || ''}</td>
      </tr>
    `).join('');
  } catch(e) { alert(e.message); }
}

async function createUser() {
  const payload = {
    username: document.getElementById('nu-user').value,
    email: document.getElementById('nu-email').value,
    password: document.getElementById('nu-pass').value,
    role: document.getElementById('nu-role').value,
    mfa_enabled: false
  };
  try {
    await api('POST', '/admin/users', payload);
    document.getElementById('create-modal').classList.remove('open');
    loadUsers();
  } catch (e) { alert("Error provisioning account: " + e.message); }
}

async function updateRole(uid, role) {
  try { await api('PUT', '/admin/users/'+uid+'/role', {role}); loadUsers(); } catch(e) { alert(e.message); }
}
async function toggleActive(uid, active) {
  try { await api('PUT', '/admin/users/'+uid+'/active', {is_active:active}); loadUsers(); } catch(e) { alert(e.message); }
}

function logout() { localStorage.removeItem('token'); window.location.href = '/'; }

// Startup
if(!token) window.location.href = '/';
else nav('users');
</script>
</body>
</html>
